name: Collect market data

# Fetches canonical US market data (yfinance + FRED) in this network-open runner
# and commits data/market_data.json, data/intraday.json, data/yield_curve.png.
# The cloud routine (network-restricted) then reads those files instead of scraping
# the web — making STEP 1 deterministic instead of a best-effort search game.

on:
  schedule:
    # US close is 20:00 UTC (EDT) / 21:00 UTC (EST). The cloud routine fires at
    # 23:00 UTC (0 23 * * 1-5). Run after the close and finish well before then.
    # Two slots for resilience — the second is a no-op if the first already
    # produced a complete dataset for the same report date.
    - cron: '30 21 * * 1-5'
    - cron: '15 22 * * 1-5'
  workflow_dispatch:
    inputs:
      force:
        description: 'Regenerate even if a complete dataset for the same report date exists'
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: collect-market-data
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install CJK font (for chart labels)
        run: sudo apt-get update -qq && sudo apt-get install -y -qq fonts-noto-cjk

      - name: Install Python deps
        run: pip install --quiet yfinance pandas matplotlib certifi

      - name: Collect
        run: |
          python scripts/collect_market_data.py --outdir data ${{ (github.event_name == 'workflow_dispatch' && inputs.force) && '--force' || '' }}

      - name: Report status
        run: |
          python - <<'PY'
          import json
          d = json.load(open('data/market_data.json'))
          print(f"report_date={d['report_date']} complete={d['complete']}")
          if d['missing']:
              print('missing:', ', '.join(d['missing']))
          PY

      - name: Commit data
        run: |
          git config user.name  'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add data/market_data.json data/intraday.json data/econ_indicators.json data/sector_performance.html data/yield_curve.png 2>/dev/null || git add data/market_data.json data/intraday.json data/econ_indicators.json data/sector_performance.html
          if git diff --cached --quiet; then
            echo 'No data changes to commit.'
          else
            RD=$(python -c "import json;print(json.load(open('data/market_data.json'))['report_date'])")
            git commit -m "data: market data for ${RD}"
            git push
          fi
